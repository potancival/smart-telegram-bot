services:
  - type: worker
    name: smart-telegram-bot
    runtime: python
    region: frankfurt  # или Singapore, если ближе
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    plan: free
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: TAVILY_API_KEY
        sync: false